<!DOCTYPE html>
<html>
<head>
  <title>Tournyx Esport</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    header {
      padding: 30px;
      text-align: center;
      background: linear-gradient(90deg, #00ffc8, #007cf0);
      color: black;
    }

    nav {
      text-align: center;
      padding: 15px;
      background: #111827;
    }

    nav a {
      margin: 10px;
      color: #00ffc8;
      text-decoration: none;
      font-weight: bold;
    }

    .banner {
      text-align: center;
      padding: 10px;
      background: #ffcc00;
      color: black;
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {opacity: 1;}
      50% {opacity: 0.6;}
      100% {opacity: 1;}
    }

    .section {
      padding: 30px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #111827;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      width: 200px;
    }

    .leaderboard {
      max-width: 500px;
      margin: auto;
      text-align: left;
    }

    .player {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    .socials a {
      display: inline-block;
      margin: 5px;
      color: #00ffc8;
    }

    button {
      padding: 10px 20px;
      background: #00ffc8;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>🎮 TOURNYX ESPORT</h1>
  <p>Competitive Platform • Crypto Prize • Real Matches</p>
</header>

<nav>
  <a href="/shop.html">Shop</a>
  <a href="/tournaments.html">Tournaments</a>
  <a href="/login.html">Login</a>
</nav>

<!-- 🔥 ANNOUNCEMENTS BANNER -->
<div class="banner" id="banner">
  Loading announcements...
</div>

<!-- 📊 LIVE STATS -->
<div class="section">
  <h2>📊 Platform Stats</h2>

  <div class="cards">
    <div class="card">
      <h3 id="players">0</h3>
      <p>Players</p>
    </div>

    <div class="card">
      <h3 id="matches">0</h3>
      <p>Matches</p>
    </div>

    <div class="card">
      <h3 id="prize">0</h3>
      <p>Prize Pool (USDT)</p>
    </div>
  </div>
</div>

<!-- 🏆 LEADERBOARD -->
<div class="section">
  <h2>🏆 Leaderboard</h2>

  <div class="leaderboard" id="leaderboard">
    Loading...
  </div>
</div>

<!-- 🚀 CTA -->
<div class="section">
  <h2>Play & Win Crypto</h2>
  <button onclick="location.href='/matchmaking.html'">Start Playing</button>
</div>

<!-- 🌐 SOCIAL -->
<div class="section socials">
  <h3>Follow Tournyx</h3>

  <a href="https://discord.gg/mk3uFdbU">Discord</a>
  <a href="https://youtube.com/@tournyxesport">YouTube</a>
  <a href="https://www.tiktok.com/@tournyxesport">TikTok</a>
  <a href="https://x.com/tournyxesport">X</a>
  <a href="https://www.instagram.com/tournyxesport">Instagram</a>
  <a href="https://www.facebook.com/share/1DywZEPyji/">Facebook</a>
  <a href="https://www.threads.com/@tournyxesport">Threads</a>

</div>

<script src="js/app.js"></script>

</body>
</html>
