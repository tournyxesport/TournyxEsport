<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>👑 TOURNYX ADMIN</h1>

<h2>Create Tournament</h2>

<input id="tTitle" placeholder="title">
<input id="tGame" placeholder="game">
<input id="tImage" placeholder="image">
<input id="tFee" placeholder="entry fee">
<input id="tPrize" placeholder="cashprize">

<button onclick="createTournament()">
  Publish Tournament
</button>

<hr>

<h2>Create Shop Product</h2>

<input id="sTitle" placeholder="title">
<input id="sImage" placeholder="image">
<input id="sLink" placeholder="affiliate link">
<input id="sPrice" placeholder="price">

<button onclick="createShop()">
  Publish Product
</button>

<hr>

<h2>Create Sponsor</h2>

<input id="spTitle" placeholder="title">
<input id="spImage" placeholder="image">
<input id="spLink" placeholder="link">

<button onclick="createSponsor()">
  Publish Sponsor
</button>

<script src="js/admin.js"></script>

</body>
</html>
